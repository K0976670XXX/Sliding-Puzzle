<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sliding Puzzle</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-top">
        <div>
          <h1>Sliding Puzzle</h1>
          <p>挑戰步數與速度排行榜，也可以用你喜歡的圖片來玩拼圖。</p>
        </div>
      </div>
    </header>

    <section class="spotlight-grid compact-links" aria-label="站內連結">
      <a
        class="button-link spotlight-link"
        href="https://store.line.me/stickershop/author/5851325/zh-Hant"
        target="_blank"
        rel="noreferrer noopener"
      >LINE 貼圖</a>
      <a class="button-link button-link-secondary spotlight-link" href="gallery.html">圖片圖庫</a>
      <a class="button-link spotlight-link spotlight-link-full" href="changelog.html">版本更新</a>
    </section>

    <div class="layout">
      <aside class="sidebar">
        <section class="panel controls-panel" aria-label="遊戲設定">
          <div class="field-group">
            <label for="playerName">玩家名稱</label>
            <div class="inline-field">
              <input id="playerName" type="text" maxlength="20" placeholder="輸入你的名字">
              <button id="saveNameBtn" type="button" class="secondary-btn">儲存名稱</button>
            </div>
            <p class="field-hint">名稱會儲存在本機，送榜時會使用這個名字。</p>
          </div>

          <div class="field-group">
            <label for="sizeSelect">拼圖尺寸</label>
            <select id="sizeSelect">
              <option value="3" selected>3 x 3</option>
              <option value="4">4 x 4</option>
              <option value="5">5 x 5</option>
              <option value="6">6 x 6</option>
            </select>
          </div>

          <div class="button-row">
            <button id="shuffleBtn" type="button">開始新局</button>
          </div>
        </section>

        <section class="panel preview" aria-label="拼圖原圖預覽">
          <div class="preview-frame">
            <img id="previewImage" alt="拼圖原圖預覽">
          </div>
        </section>
      </aside>

      <section class="game-area">
        <div class="board-wrap">
          <div id="board" class="board" role="grid" aria-label="Sliding puzzle board"></div>
        </div>

        <section class="panel status-panel" aria-live="polite">
          <div class="status-item">
            <span class="status-label">步數</span>
            <strong id="moves">0</strong>
          </div>
          <div class="status-item">
            <span class="status-label">時間</span>
            <strong id="timer">00:00:00.000</strong>
          </div>
          <p id="message" class="message"></p>
          <p id="rankUpdateStatus" class="rank-update-status"></p>
          <div class="status-actions">
            <button id="hintBtn" type="button" class="secondary-btn">提示一步</button>
            <button id="solveBtn" type="button" class="success-btn">自動還原</button>
          </div>
          <div id="replayControls" class="replay-controls" hidden>
            <div class="replay-nav-row">
              <button id="replayLastBtn" type="button" class="ghost-btn replay-arrow-btn" aria-label="回到結尾">&raquo;</button>
              <button id="replayFirstBtn" type="button" class="ghost-btn replay-arrow-btn" aria-label="回到最開始">&laquo;</button>
              <button id="replayPrevBtn" type="button" class="ghost-btn replay-arrow-btn" aria-label="上一步">&larr;</button>
              <span id="replayStatus" class="replay-status">0 / 0</span>
              <button id="replayNextBtn" type="button" class="ghost-btn replay-arrow-btn" aria-label="下一步">&rarr;</button>
            </div>
            <div class="replay-reference-row">
              <span id="autoReplayInfo" class="replay-meta" hidden>自動還原：-- 步</span>
              <button id="replayRouteToggleBtn" type="button" class="ghost-btn replay-toggle-btn" hidden>查看自動還原</button>
            </div>
            <div class="replay-review-row">
              <button id="reviewSolveBtn" type="button" class="success-btn review-solve-btn" hidden>根據當前求解</button>
              <button id="reviewModeBtn" type="button" class="secondary-btn review-mode-btn">開始復盤</button>
            </div>
          </div>
        </section>
      </section>
    </div>

    <section class="panel leaderboard-panel" aria-label="排行榜">
      <div class="panel-header">
        <h2>排行榜</h2>
        <div class="panel-actions">
          <button id="toggleLeaderboardModeBtn" type="button" class="ghost-btn">查看速度榜</button>
          <button id="refreshRankBtn" type="button" class="ghost-btn">重新整理</button>
        </div>
      </div>
      <p id="leaderboardStatus" class="field-hint" aria-live="polite"></p>
      <ol id="leaderboardList" class="leaderboard-list"></ol>
    </section>
  </main>

  <script src="scripts/state.js"></script>
  <script src="scripts/solver.js"></script>
  <script src="scripts/game.js"></script>
</body>
</html>
